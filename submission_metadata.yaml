ai_usage_summary: |
  Used Claude for architecture discussion and code review.
  No candidate data was fed to any LLM. All scoring logic,
  weights, and honeypot detection were designed and validated
  by the participant.

methodology_summary: |
  Rule-based ranker with 7 weighted scoring components. Skill match
  (38%) is the dominant signal — weighted by proficiency × endorsements
  × duration, not keyword counting. Zero-evidence skills get 5% trust
  regardless of claimed level. Career quality (22%) penalizes
  consulting-only backgrounds (TCS, Infosys, Wipro, Accenture,
  Cognizant, Capgemini) explicitly called out in the JD. Availability
  (15%) multiplier down-weights inactive or unresponsive candidates —
  inactive >6 months caps at 0.35. Honeypot detection flags 4 patterns
  of impossible profiles before scoring. Runtime ~60 seconds on CPU
  for 100K candidates. stdlib only, no pip installs, no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true