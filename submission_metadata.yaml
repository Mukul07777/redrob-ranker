methodology_summary: |
  Rule-based ranker with 7 weighted scoring components. Skill match
  is the dominant signal, weighted by proficiency, endorsements, and
  duration — not keyword counting. Career quality penalizes
  consulting-only backgrounds explicitly called out in the JD.
  Availability multiplier down-weights inactive or unresponsive
  candidates. Honeypot detection flags impossible profiles before
  scoring.

